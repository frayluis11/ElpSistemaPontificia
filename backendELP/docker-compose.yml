services:
  # Servicio Backend FastAPI
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: backendelp-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - elp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health'); print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Servicio PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: backendelp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2024!
      POSTGRES_DB: sistemaelp_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - elp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sistemaelp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Adminer para administración de base de datos
  adminer:
    image: adminer:4.8.1
    container_name: backendelp-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    networks:
      - elp-network
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  postgres_data:

networks:
  elp-network:
    driver: bridge